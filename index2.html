<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دەمزانی کە هەر خۆشت ەوێم، منیش خۆشم دەوێیت</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    font-family:'Segoe UI',sans-serif;
    color:white;
    text-align:center;
}

h1{
    font-size:60px;
    margin-bottom:20px;
}

p{
    font-size:28px;
}

.heart{
    font-size:80px;
    animation:beat 1s infinite;
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="heart">❤️</div>

<h1>پێویست بە شرم ناکا چونکە خۆم زوور ئەمزانی</h1>

<p>
Forever and always, Sana ❤️<br>
You just made Barham the happiest person. 🥰
</p>

</body>
</html>
