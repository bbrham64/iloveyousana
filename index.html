<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sana ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffd1ff);
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;
}

.box{
    background:rgba(255,255,255,0.95);
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    z-index:2;
}

h1{
    color:#ff4d6d;
    margin-bottom:20px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:25px;
}

button{
    padding:15px 25px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

#yesBtn{
    background:#4CAF50;
    color:white;
}

#yesBtn:hover{
    transform:scale(1.05);
}

#noBtn{
    background:#f44336;
    color:white;
    position:relative;
}

/* Floating Hearts */
.heart{
    position:absolute;
    color:pink;
    font-size:25px;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="box">
    <h1>💖 Are you still loving me, Sana? 💖</h1>

    <div class="buttons">
        <button id="yesBtn">Yes Barham, I still love you ❤️</button>
        <button id="noBtn">No, I don't love you anymore</button>
    </div>
</div>

<script>
const noBtn = document.getElementById("noBtn");
let moves = 0;

noBtn.addEventListener("mouseover", () => {

    if(moves < 5){
        const x = Math.random() * (window.innerWidth - 150);
        const y = Math.random() * (window.innerHeight - 100);

        noBtn.style.position = "absolute";
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";

        moves++;
    }else{
        noBtn.style.display = "none";
    }
});

document.getElementById("yesBtn").onclick = function(){
    window.location.href = "love.html";
};

// Floating hearts
for(let i=0;i<25;i++){
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.animationDuration = (Math.random()*5+5) + "s";
    heart.style.fontSize = (Math.random()*20+15) + "px";
    document.body.appendChild(heart);
}
</script>

</body>
</html>
